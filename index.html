    </div>

    <div id="pause-screen" class="screen hidden">

        <button class="btn" id="resume-btn"></button>
    </div>

    <div id="game-over-screen" class="screen hidden">

let audioCtx = null, musicEnabled = localStorage.getItem('oceanMusicEnabled') !== 'false';
let musicStarted = false, melodyTimer = null, droneNodes = [];

function initAudio() {
    if (audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    if (musicEnabled) startMusic();
    updateMusicButton();
}
function startMusic() {
    if (!audioCtx || !musicEnabled) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    musicStarted = true; scheduleNote();
    if (droneNodes.length === 0) playDrone();
}
function stopMusic() {
    if (melodyTimer) clearTimeout(melodyTimer);
    musicStarted = false;
    droneNodes.forEach(n => { try{n.osc1.stop();n.osc2.stop();}catch(e){} n.osc1.disconnect();n.osc2.disconnect();n.gain.disconnect();n.filter.disconnect(); });
    droneNodes = [];
    if (audioCtx) audioCtx.suspend();
}
function toggleMusic() {
    musicEnabled = !musicEnabled;
    localStorage.setItem('oceanMusicEnabled', musicEnabled);
    updateMusicButton();
    if (!audioCtx) { initAudio(); return; }
    if (musicEnabled) { if(audioCtx.state==='suspended')audioCtx.resume(); startMusic(); } else { stopMusic(); }
}
function updateMusicButton() { const b=document.getElementById('music-btn'); if(b)b.innerText=musicEnabled?"🔊":"🔇"; }
function playDrone() {
    if (!audioCtx||!musicEnabled) return;
    const o1=audioCtx.createOscillator(),o2=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
    o1.type='sine';o1.frequency.value=55; o2.type='sine';o2.frequency.value=110;o2.detune.value=5;
    f.type='lowpass';f.frequency.value=400; g.gain.value=0.15;
    o1.connect(g);o2.connect(g);g.connect(f);f.connect(audioCtx.destination);
    droneNodes.push({osc1:o1,osc2:o2,gain:g,filter:f}); o1.start();o2.start();
}
function scheduleNote() {
    if(!musicEnabled||!musicStarted) return;
    const notes=[261.63,293.66,329.63,392.00,440.00];
    playTone(notes[Math.floor(Math.random()*notes.length)], audioCtx.currentTime, 2, 0.05);
    melodyTimer = setTimeout(scheduleNote, Math.random()*3000+2000);
}
function playTone(freq,time,dur,vol) {
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,time);g.gain.linearRampToValueAtTime(vol,time+0.5);g.gain.linearRampToValueAtTime(0,time+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.onended=()=>{o.disconnect();g.disconnect();}; o.start(time);o.stop(time+dur);
}
function playSound(type) {
    if(!audioCtx||!musicEnabled) return;
    if(audioCtx.state==='suspended')audioCtx.resume();
    const t=audioCtx.currentTime, o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.onended=()=>{o.disconnect();g.disconnect();};
    if(type==='collect') {
        o.type='sine';o.frequency.setValueAtTime(523.25,t);o.frequency.exponentialRampToValueAtTime(659.25,t+0.1);
        g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t);o.stop(t+0.1);
    } else if(type==='hit') {
        o.type='triangle';o.frequency.setValueAtTime(130.81,t);o.frequency.exponentialRampToValueAtTime(65.41,t+0.15);
        g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.15); o.start(t);o.stop(t+0.15);
    } else if(type==='gameover') {
        playTone(392,t,1,0.1);playTone(329.63,t+0.5,1,0.1);playTone(261.63,t+1,2,0.1); return;
    } else if(type==='stageclear') {
        playTone(523.25,t,0.3,0.12);playTone(659.25,t+0.15,0.3,0.12);playTone(783.99,t+0.3,0.5,0.15); return;
    } else if(type==='heal') {
        o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+0.2);
        g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.25); o.start(t);o.stop(t+0.25);
    } else if(type==='meme') {
        playTone(440,t,0.15,0.1);playTone(554.37,t+0.1,0.15,0.1);playTone(659.25,t+0.2,0.15,0.1);playTone(880,t+0.3,0.3,0.12); return;
    } else if(type==='combo_up') {
        o.type='square';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(900,t+0.08);
        g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t);o.stop(t+0.1);
    } else if(type==='boss_warn') {
        o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.linearRampToValueAtTime(100,t+0.4);
        g.gain.setValueAtTime(0.08,t);g.gain.linearRampToValueAtTime(0,t+0.5); o.start(t);o.stop(t+0.5);
    } else { return; }
}

function onAuthReady(uid) {
    const localData=localStorage.getItem('oceanPlayer');

        currentUser=JSON.parse(localData); currentUser.uid=uid; highScore=currentUser.highScore||0;
        localStorage.setItem('oceanPlayer',JSON.stringify(currentUser));

        auth.signInAnonymously().catch(()=>{}); return;

    db.ref('nicknames/'+nickLow).once('value').then(snap=>{
        if(snap.exists()){errorMsg.innerText=t('errNicknameTaken');}
        else{

            const up={};up['/players/'+uid]=pd;up['/nicknames/'+nickLow]={uid};
            db.ref().update(up).then(()=>{

                localStorage.removeItem(PENDING_NICKNAME_KEY);highScore=0;updateStartScreen();showScreen('start-screen');

        const p=[];snap.forEach(ch=>p.push(ch.val()));p.reverse();cacheLeaderboard(p);renderLeaderboard(c,p,false);
    }).catch(()=>{if(cached.length>0)renderLeaderboard(c,cached,true);else c.innerHTML='<div style="text-align:center;padding:20px;">'+t('rankingLoadFailed')+'</div>';});

function handleCanvasTap(clientX, clientY) {

        const w = getWidth(), h = getHeight();
        const cardW = w * 0.26, cardH = h * 0.22, gap = w * 0.04;
        const totalW = cardW * 3 + gap * 2;
        const startX = (w - totalW) / 2, startY = h * 0.38;
        for (let i = 0; i < 3; i++) {
            const cx = startX + i * (cardW + gap);
            if (clientX >= cx && clientX <= cx + cardW && clientY >= startY && clientY <= startY + cardH) {
                selectBlessing(blessingOptions[i]);
                return;
            }
        }
    }
    if (gameState === 'STAGE_CLEAR' && clearTimer <= 0) {
        if (currentStageIdx >= STAGES.length - 1) { enterVictory(); }
        else { enterBlessings(); }
    }
    if (gameState === 'VICTORY') {
        finishRun();

    if (gameState === 'STAGE_INTRO' && introTimer <= 0) {
        beginPlaying();
    }

// ===== WAVE SPAWN SYSTEM =====
function spawnWave() {
    const cfg = STAGES[currentStageIdx];
    if (items.length >= cfg.maxActive) return;
    const lanes = getLanes();
    const budget = 3 + Math.floor(Math.random() * 3); // 3-5 items
    const pattern = pickPattern(budget, lanes);
    for (const spawn of pattern) {
        if (items.length >= cfg.maxActive) break;
        // Check 90px spacing in same lane
        const tooClose = items.some(it => Math.abs(it.x - spawn.x) < 30 && it.y < 90);
        if (tooClose) continue;
        const typeKey = pickItemType(cfg, spawn.forceType);
        const def = ITEM_TYPES[typeKey];
        items.push({
            def, typeKey, x: spawn.x, y: -30 - Math.random()*40,
            radius: def.bigRadius ? 25 : 20,
            speedMult: 0.85 + Math.random()*0.3,
            offset: Math.random()*100,
            collectAnim: 0, collecting: false
        });
    }
}

function pickPattern(budget, lanes) {
    const patterns = [patternSingleLine, patternVShape, patternPairs, patternGapWall, patternRainSlow];
    const fn = patterns[Math.floor(Math.random() * patterns.length)];
    return fn(budget, lanes);
}

function patternSingleLine(n, lanes) {
    const used = new Set();
    const result = [];
    for (let i = 0; i < Math.min(n, lanes.length); i++) {
        let lane;
        do { lane = Math.floor(Math.random() * lanes.length); } while (used.has(lane) && used.size < lanes.length);
        used.add(lane);
        result.push({ x: lanes[lane] });
    }
    return result;
}

function patternVShape(n, lanes) {
    const center = Math.floor(lanes.length / 2);
    const result = [{ x: lanes[center] }];
    for (let i = 1; result.length < n && i <= 4; i++) {
        if (center - i >= 0) result.push({ x: lanes[center - i] });
        if (center + i < lanes.length && result.length < n) result.push({ x: lanes[center + i] });
    }
    return result;
}

function patternPairs(n, lanes) {
    const result = [];
    const start = Math.floor(Math.random() * (lanes.length - 1));
    result.push({ x: lanes[start], forceType: 'treasure' });
    result.push({ x: lanes[start + 1], forceType: 'treasure' });
    if (n > 2) {
        const s2 = (start + 4) % (lanes.length - 1);
        result.push({ x: lanes[s2], forceType: 'treasure' });
        if (n > 3) result.push({ x: lanes[s2 + 1], forceType: 'treasure' });
    }
    return result;
}

function patternGapWall(n, lanes) {
    const gap = Math.floor(Math.random() * (lanes.length - 2)) + 1;
    const result = [];
    for (let i = 0; i < lanes.length && result.length < n; i++) {
        if (i !== gap && i !== gap + 1) {
            result.push({ x: lanes[i] });
        }
    }
    return result;
}

function patternRainSlow(n, lanes) {
    const result = [];
    for (let i = 0; i < Math.min(n + 1, lanes.length); i++) {
        const lane = Math.floor(Math.random() * lanes.length);
        result.push({ x: lanes[lane], forceType: 'treasure' });
    }
    return result;
}

function pickItemType(cfg, forceType) {
    if (forceType === 'treasure') {
        const t = cfg.treasures;
        return t[Math.floor(Math.random() * t.length)];
    }
    // Decide: treasure, obstacle, or powerup based on shares
    const roll = Math.random();
    if (roll < cfg.obstShare) {
        return cfg.obstacles[Math.floor(Math.random() * cfg.obstacles.length)];
    }
    return cfg.treasures[Math.floor(Math.random() * cfg.treasures.length)];
}

// ===== BOSS EVENTS =====
function updateBossEvent(dt) {
    if (!bossState) return;
    bossState.timer += dt;
    bossState.subTimer += dt;
    const w = getWidth(), h = getHeight();
    switch(bossState.type) {
        case 'bubbleCurrent': // Gentle L/R drift
            bossState.data.drift = Math.sin(bossState.timer * 1.25) * 2.5;
            // Still spawn some items
            if (bossState.subTimer > 2) { bossState.subTimer=0; spawnWave(); }
            break;
        case 'crabParade': // Block 2 lanes
            if (!bossState.data.lanes) { bossState.data.lanes = pickTwoLanes(); bossState.data.swapTimer = 0; }
            bossState.data.swapTimer += dt;
            if (bossState.data.swapTimer > 1.2) { bossState.data.lanes = pickTwoLanes(); bossState.data.swapTimer = 0; }
            if (bossState.subTimer > 2.5) { bossState.subTimer=0; spawnWave(); }
            break;
        case 'eelBeams': // Warning line then beam
            if (!bossState.data.beamPhase) { bossState.data.beamPhase='idle'; bossState.data.beamTimer=0; bossState.data.beamLane=-1; }
            bossState.data.beamTimer += dt;
            if (bossState.data.beamPhase==='idle' && bossState.data.beamTimer > 2) {
                bossState.data.beamPhase='warn'; bossState.data.beamTimer=0;
                bossState.data.beamLane = Math.floor(Math.random()*9);
            } else if (bossState.data.beamPhase==='warn' && bossState.data.beamTimer > 0.7) {
                bossState.data.beamPhase='active'; bossState.data.beamTimer=0;
            } else if (bossState.data.beamPhase==='active' && bossState.data.beamTimer > 1.0) {
                bossState.data.beamPhase='idle'; bossState.data.beamTimer=0;
                // Check if diver is in beam lane
                const lanes = getLanes();
                if (bossState.data.beamLane >= 0 && Math.abs(diver.x - lanes[bossState.data.beamLane]) < 35) {
                    hitDiver();
                }
            }
            if (bossState.subTimer > 3) { bossState.subTimer=0; spawnWave(); }
            break;
        case 'cannonVolley': // Telegraph circles + fast drops
            if (!bossState.data.volley) { bossState.data.volley=[]; bossState.data.volleyTimer=0; }
            bossState.data.volleyTimer += dt;
            if (bossState.data.volleyTimer > 1.5 && bossState.data.volley.length === 0) {
                const lanes = getLanes();
                for (let i = 0; i < 3; i++) {
                    const lx = lanes[Math.floor(Math.random()*lanes.length)];
                    bossState.data.volley.push({ x:lx, timer:0, phase:'warn' });
                }
                bossState.data.volleyTimer = 0;
            }
            bossState.data.volley.forEach(v => {
                v.timer += dt;
                if (v.phase==='warn' && v.timer > 0.8) {
                    v.phase='drop'; v.timer=0; v.y=-20;
                } else if (v.phase==='drop') {
                    v.y = (v.y||0) + 800 * dt;
                    if (Math.abs(diver.x - v.x) < 30 && Math.abs(diver.y - v.y) < 30) { hitDiver(); v.phase='done'; }
                    if (v.y > h + 50) v.phase='done';
                }
            });
            bossState.data.volley = bossState.data.volley.filter(v=>v.phase!=='done');
            break;
        case 'krakenTentacles': // 3 sequential zones
            if (!bossState.data.zones) { bossState.data.zones=[]; bossState.data.zoneIdx=0; bossState.data.zoneTimer=0;
                for(let i=0;i<3;i++) bossState.data.zones.push({x:w*0.2+i*w*0.3,active:false});
            }
            bossState.data.zoneTimer += dt;
            if (bossState.data.zoneTimer > 1.3) {
                bossState.data.zoneTimer = 0;
                bossState.data.zones.forEach(z=>z.active=false);
                const zi = bossState.data.zoneIdx % 3;
                bossState.data.zones[zi].active = true;
                // Check hit
                if (Math.abs(diver.x - bossState.data.zones[zi].x) < 50) hitDiver();
                bossState.data.zoneIdx++;
            }
            if (bossState.subTimer > 3) { bossState.subTimer=0; spawnWave(); }
            break;
        case 'ventEruption': // 3 vertical columns
            if (!bossState.data.vents) {
                bossState.data.vents = []; bossState.data.ventTimer=0; bossState.data.ventPhase='charge';
                for(let i=0;i<3;i++) bossState.data.vents.push({x:w*0.2+i*w*0.3});
            }
            bossState.data.ventTimer += dt;
            if (bossState.data.ventPhase==='charge' && bossState.data.ventTimer > 1.0) {
                bossState.data.ventPhase='burst'; bossState.data.ventTimer=0;
            } else if (bossState.data.ventPhase==='burst' && bossState.data.ventTimer > 0.8) {
                bossState.data.ventPhase='charge'; bossState.data.ventTimer=0;
                // Check hits
                bossState.data.vents.forEach(v=>{if(Math.abs(diver.x-v.x)<40)hitDiver();});
            }
            if (bossState.subTimer > 3) { bossState.subTimer=0; spawnWave(); }
            break;
        case 'orcaDash': // Shadow then dash
            if (!bossState.data.orcaPhase) { bossState.data.orcaPhase='idle'; bossState.data.orcaTimer=0; bossState.data.orcaLane=-1; bossState.data.orcaY=-60; }
            bossState.data.orcaTimer += dt;
            if (bossState.data.orcaPhase==='idle' && bossState.data.orcaTimer > 2) {
                bossState.data.orcaPhase='warn'; bossState.data.orcaTimer=0;
                bossState.data.orcaLane = Math.floor(Math.random()*9);
                bossState.data.orcaY = -60;
            } else if (bossState.data.orcaPhase==='warn' && bossState.data.orcaTimer > 1.0) {
                bossState.data.orcaPhase='dash'; bossState.data.orcaTimer=0;
            } else if (bossState.data.orcaPhase==='dash') {
                bossState.data.orcaY += 900 * dt;
                const lanes = getLanes();
                if (bossState.data.orcaLane >= 0 && Math.abs(diver.x - lanes[bossState.data.orcaLane]) < 35 && Math.abs(diver.y - bossState.data.orcaY) < 40) { hitDiver(); bossState.data.orcaPhase='idle'; }
                if (bossState.data.orcaY > h + 60) { bossState.data.orcaPhase='idle'; bossState.data.orcaTimer=0; }
            }
            if (bossState.subTimer > 2.5) { bossState.subTimer=0; spawnWave(); }
            break;
        case 'memeRemix': // Treasure only + effects
            if (bossState.subTimer > 1.5) { bossState.subTimer=0; spawnBonusWave(); }
            if (memeTimeTimer <= 0) memeTimeTimer = 15;
            break;
    }
}

function pickTwoLanes() {
    const a = Math.floor(Math.random()*9);
    let b; do{b=Math.floor(Math.random()*9);}while(b===a);
    return [a, b];
}

function hitDiver() {
    if (activePowerup === 'SHIELD') {
        activePowerup = null; powerupTimer = 0;
        createExplosion(diver.x, diver.y, 'cyan');
        addFloatingText(t('floatingShieldBlock'), diver.x, diver.y, 'cyan');
        return;
    }
    if (activePowerup === 'FEVER') {
        score += 50;
        createExplosion(diver.x, diver.y, 'gold');
        addFloatingText('+50', diver.x, diver.y, '#ffd700');
        return;
    }
    lives--;
    stageHitCount++;
    shakeIntensity = 10;
    freezeFrames = 6; // 0.1s
    vignetteAlpha = 0.35; vignetteColor = 'red';
    playSound('hit');
    createExplosion(diver.x, diver.y, 'red');
    addFloatingText(t('floatingOuch'), diver.x, diver.y, 'red');
    comboCount = 0; comboTimer = 0;
    if (lives <= 0) gameOver();
}
// ===== COLLISION & COLLECT =====
function collectItem(item, index) {
    items.splice(index, 1);
    const def = item.def;

    if (def.type === 'treasure') {
        playSound('collect');
        comboCount++;
        comboTimer = COMBO_BASE + (blessingComboGrace ? 0.5 : 0) + (def.comboExt || 0.35);
        let mult = getComboMultiplier();
        let pts = def.score * mult;
        if (activePowerup === 'FEVER') pts *= 2;
        if (blessingTreasureBoost) pts = Math.floor(pts * 1.1);
        if (memeTimeTimer > 0) pts = Math.floor(pts * 1.2);
        score += pts;
        // Juice: particles based on value
        if (def.score >= 80) { createExplosion(item.x, item.y, 'gold', 18); shakeIntensity = 2; }
        else if (def.score >= 50) { createExplosion(item.x, item.y, 'gold', 14); shakeIntensity = 1; }
        else { createExplosion(item.x, item.y, 'gold', 10); }
        addFloatingText('+' + pts, item.x, item.y, '#ffd700');
        if (def.effect === 'FEVER') { activatePowerup('FEVER'); feverTriggeredThisStage = true; }
        // Track mission
        trackMissionCollect(item.typeKey);
        // Check combo rank-up
        checkComboRankUp();
    } else if (def.type === 'obstacle') {
        hitDiver();
    } else if (def.type === 'powerup') {
        playSound('collect');
        if (def.effect === 'BUBBLE_BURST') {
            // Clear nearby obstacles
            let cleared = 0;
            for (let i = items.length - 1; i >= 0; i--) {
                if (items[i].def.type === 'obstacle' && Math.hypot(items[i].x - item.x, items[i].y - item.y) < 140) {
                    createExplosion(items[i].x, items[i].y, 'cyan', 8);
                    // Convert to shell
                    items[i] = { ...items[i], def: ITEM_TYPES.SHELL, typeKey: 'SHELL' };
                    cleared++;
                    if (cleared >= 4) break;
                }
            }
            createExplosion(item.x, item.y, 'white', 15);
            addFloatingText(t('floatingBubbleBurst'), item.x, item.y, '#fff');
        } else {
            activatePowerup(def.effect);
            createExplosion(item.x, item.y, 'white', 10);
            let text = '';
            if(def.effect==='MAGNET') text=t('floatingMagnet');
            if(def.effect==='SLOW') text=t('floatingSlow');
            if(def.effect==='SHIELD') text=t('floatingShield');
            if(def.effect==='DASH') text=t('floatingDash');
            addFloatingText(text, item.x, item.y, '#fff');
        }
    } else if (def.type === 'special') {
        if (def.effect === 'HEAL') {
            lives = Math.min(3, lives + 1);
            freezeFrames = 7;
            vignetteAlpha = 0.3; vignetteColor = '#ff69b4';
            playSound('heal');
            createExplosion(item.x, item.y, '#ff69b4', 15);
            addFloatingText(t('floatingHeal'), item.x, item.y, '#ff69b4');
            // 2s shield
            activePowerup = 'SHIELD'; powerupTimer = 2;
            heartBubbleCooldown = 25;
        } else if (def.effect === 'MEME_TIME') {
            memeTimeTimer = 8;
            playSound('meme');
            freezeFrames = 5;
            createExplosion(item.x, item.y, '#ff4ddb', 25);
            addFloatingText(t('floatingMemeTime'), item.x, item.y, '#ff4ddb');
            // If 1 life, spawn heart bubble
            if (lives <= 1) {
                setTimeout(() => {
                    if (gameState === 'PLAYING' || gameState === 'BOSS_EVENT') {
                        const lanes = getLanes();
                        items.push({ def:ITEM_TYPES.HEART_BUBBLE, typeKey:'HEART_BUBBLE', x:lanes[Math.floor(Math.random()*lanes.length)], y:-40, radius:22, speedMult:0.5, offset:0, collectAnim:0, collecting:false });
                    }
                }, 500);
            }
            trackMissionCollect('DDUJJONKU');
        }
    }
    updateHUD();
}

function trackMissionCollect(typeKey) {
    const cfg = STAGES[currentStageIdx];
    const m = cfg.mission;
    if (m.type === 'collect' && m.item === typeKey) missionProgress++;
}

function getComboMultiplier() {
    if (comboCount >= 35) return 5;
    if (comboCount >= 20) return 4;
    if (comboCount >= 10) return 3;
    if (comboCount >= 5) return 2;
    return 1;
}

let lastComboMultiplier = 1;
function checkComboRankUp() {
    const m = getComboMultiplier();
    if (m > lastComboMultiplier) {
        playSound('combo_up');
        addFloatingText('x' + m + '!', diver.x, diver.y - 40, '#ff6b6b');
        // Track stage 2 mission
        if (m >= 3) comboX3Count++;
        lastComboMultiplier = m;
    }
    if (comboCount === 0) lastComboMultiplier = 1;
}

function activatePowerup(type) {
    activePowerup = type;
    if (type === 'FEVER') powerupTimer = 5;
    else if (type === 'MAGNET') powerupTimer = blessingMagnetBoost ? 6.5 : 5;
    else if (type === 'SLOW') powerupTimer = blessingSlowBoost ? 6.25 : 5;
    else if (type === 'SHIELD') powerupTimer = 10;
    else if (type === 'DASH') powerupTimer = 8;
    else powerupTimer = 5;
}

// ===== PARTICLES & EFFECTS =====
function createExplosion(x, y, color, count) {
    count = count || 10;
    for (let i = 0; i < count && particles.length < 200; i++) {
        particles.push({ x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:30, color, size:Math.random()*5+2 });
    }
}

function addFloatingText(text, x, y, color) {
    floatingTexts.push({ text, x, y, color, life: 60, maxLife: 60 });
}

function createBubble(randomY) {
    return { x:Math.random()*getWidth(), y:randomY?Math.random()*getHeight():getHeight()+20, size:Math.random()*5+2, speed:Math.random()*1+0.5, offset:Math.random()*100, opacity:Math.random()*0.5+0.1 };
}

function updateBubbles() {
    if (Math.random()<0.05) bubbles.push(createBubble());
    for (let i=bubbles.length-1;i>=0;i--) {
        const b=bubbles[i]; b.y-=b.speed; b.x+=Math.sin(performance.now()*0.001+b.offset)*0.5;
        if(b.y<-20) bubbles.splice(i,1);
    }
}

function updateHUD() {
    document.getElementById('score').innerText = score.toLocaleString();
    let hearts='';for(let i=0;i<lives;i++)hearts+='❤️';
    document.getElementById('lives').innerText = hearts;
    // Combo
    const comboEl=document.getElementById('combo-display'), comboCountEl=document.getElementById('combo-count');
    if(comboCount>1){
        comboEl.classList.add('combo-active');
        let ct='x'+comboCount;
        if(comboCount>=35)ct+=' '+t('comboLegendary');
        else if(comboCount>=20)ct+=' '+t('comboAmazing');
        else if(comboCount>=10)ct+=' '+t('comboBest');
        else if(comboCount>=5)ct+=' '+t('comboGood');
        comboCountEl.innerText=ct;
    } else { comboEl.classList.remove('combo-active'); }
    // Powerup
    const puEl=document.getElementById('powerup-indicator');
    if(activePowerup){
        puEl.style.display='block';
        let pt='';
        if(activePowerup==='MAGNET')pt=t('powerupMagnetActive');
        if(activePowerup==='SLOW')pt=t('powerupSlowActive');
        if(activePowerup==='SHIELD')pt=t('powerupShieldActive');
        if(activePowerup==='FEVER')pt=t('powerupFeverActive');
        if(activePowerup==='DASH')pt=t('powerupDashActive');
        puEl.innerText=pt;
    } else { puEl.style.display='none'; }
    // Stage info
    const si=document.getElementById('stage-info');
    if(gameState==='PLAYING'||gameState==='BOSS_EVENT'){
        const cfg=STAGES[currentStageIdx];
        si.innerText=t('stageLabel')+' '+cfg.id+' | '+Math.ceil(stageTimer)+'s';
    } else { si.innerText=''; }
}
// ===== UPDATE =====
function update(dt) {
    // Freeze frames
    if (freezeFrames > 0) { freezeFrames--; return; }

    // Vignette decay
    if (vignetteAlpha > 0) { vignetteAlpha -= dt * 1.2; if (vignetteAlpha < 0) vignetteAlpha = 0; }

    // Background bubbles always
    updateBubbles();

    // Floating texts
    for (let i=floatingTexts.length-1;i>=0;i--) {
        floatingTexts[i].life--; floatingTexts[i].y -= 1;
        if(floatingTexts[i].life<=0) floatingTexts.splice(i,1);
    }

    // Particles
    for (let i=particles.length-1;i>=0;i--) {
        const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--;
        if(p.life<=0)particles.splice(i,1);
    }

    // Shake decay
    if(shakeIntensity>0){shakeIntensity*=0.88;if(shakeIntensity<0.3)shakeIntensity=0;}

    if (gameState === 'STAGE_INTRO') {
        introTimer -= dt;
        if (introTimer <= 0) introTimer = 0;
        return;
    }

    if (gameState === 'STAGE_CLEAR') {
        clearTimer -= dt;
        if (clearTimer < 0) clearTimer = 0;
        return;
    }

    if (gameState === 'VICTORY') return;
    if (gameState === 'BLESSINGS') return;

    if (gameState === 'BONUS_ROUND') {
        bonusTimer -= dt;
        updateDiver(dt);
        // Spawn treasure waves
        waveTimer -= dt * 1000;
        if (waveTimer <= 0) { spawnBonusWave(); waveTimer = 1200; }
        updateItems(dt, true);
        if (bonusTimer <= 0) {
            currentStageIdx++;
            enterStageIntro();
        }
        updateHUD();
        return;
    }

    if (gameState !== 'PLAYING' && gameState !== 'BOSS_EVENT') return;

    // Stage timer
    stageTimer -= dt;

    if (gameState === 'PLAYING') {
        if (stageTimer <= 0) {
            enterBossEvent();
            return;
        }
        // Wave spawn
        waveTimer -= dt * 1000;
        if (waveTimer <= 0) {
            spawnWave();
            trySpawnHeartBubble();
            const cfg = STAGES[currentStageIdx];
            waveTimer = randRange(cfg.waveInt[0], cfg.waveInt[1]);
        }
        // Rainbow pearl timer
        nextRainbowTime -= dt * 1000;
        if (nextRainbowTime <= 0) {
            spawnRainbowPearl();
            const cfg = STAGES[currentStageIdx];
            nextRainbowTime = randRange(cfg.rpInt[0], cfg.rpInt[1]);
        }
        // Powerup timer
        nextPowerupTime -= dt * 1000;
        if (nextPowerupTime <= 0) {
            spawnPowerup();
            const cfg = STAGES[currentStageIdx];
            nextPowerupTime = randRange(cfg.puInt[0], cfg.puInt[1]);
        }
        // Ddujjonku
        trySpawnDdujjonku();
    }

    if (gameState === 'BOSS_EVENT') {
        if (stageTimer <= 0) {
            enterStageClear();
            return;
        }
        updateBossEvent(dt);
    }

    updateDiver(dt);
    updateItems(dt, false);

    // Meme time
    if (memeTimeTimer > 0) { memeTimeTimer -= dt; if (memeTimeTimer < 0) memeTimeTimer = 0; }

    // Heart bubble cooldown
    if (heartBubbleCooldown > 0) heartBubbleCooldown -= dt;

    // Powerup timer
    if (activePowerup) {
        powerupTimer -= dt;
        if (powerupTimer <= 0) { activePowerup = null; powerupTimer = 0; }
    }

    // Combo timer
    if (comboCount > 0) {
        comboTimer -= dt;
        if (comboTimer <= 0) { comboCount = 0; comboTimer = 0; lastComboMultiplier = 1; }
    }

    updateHUD();
}

function updateDiver(dt) {
    diver.targetX = Math.max(diver.radius, Math.min(getWidth()-diver.radius, diver.targetX));
    let dx = diver.targetX - diver.x;
    let moveSpeed = activePowerup === 'DASH' ? 0.21 : 0.15;
    diver.x += dx * moveSpeed;
    diver.angle = dx * 0.05;
    diver.angle = Math.max(-0.5, Math.min(0.5, diver.angle));
    diver.y = (getHeight()-100) + Math.sin(performance.now()*0.003)*5;
}

function updateItems(dt, isBonus) {
    const cfg = STAGES[currentStageIdx];
    for (let i=items.length-1;i>=0;i--) {
        const item = items[i];
        let speed = cfg.speedBase * item.speedMult;
        if (activePowerup === 'SLOW') speed *= 0.5;
        if (isBonus) speed *= 0.7;
        item.y += speed * dt;
        // Lateral movement
        item.x += Math.sin(performance.now()*0.002 + item.offset) * 1.2;
        // Boss drift
        if (bossState && bossState.data.drift) item.x += bossState.data.drift;
        // Special movement types
        if (item.def.moveType === 'sideways') item.x += Math.sin(performance.now()*0.0015) * 2.5;
        if (item.def.moveType === 'diagonal') item.x += 1.5;
        // Magnet
        if (activePowerup === 'MAGNET' && item.def.type === 'treasure') {
            let d = Math.hypot(diver.x-item.x, diver.y-item.y);
            let magnetRange = blessingMagnetBoost ? 390 : 300;
            if (d < magnetRange) { item.x += (diver.x-item.x)*0.05; item.y += (diver.y-item.y)*0.05; }
        }
        // Fever converts obstacles
        if (activePowerup === 'FEVER' && item.def.type === 'obstacle') {
            item.def = ITEM_TYPES.SHELL; item.typeKey = 'SHELL';
        }
        // Collision
        let dist = Math.hypot(diver.x-item.x, diver.y-item.y);
        if (dist < diver.radius + item.radius) {
            if (isBonus && item.def.type === 'obstacle') { items.splice(i,1); continue; }
            collectItem(item, i);
            continue;
        }
        // Remove if off screen
        if (item.y > getHeight()+60 || item.x < -60 || item.x > getWidth()+60) items.splice(i,1);
    }
}
// ===== DRAW =====
function drawWaves(time) {
    const w=getWidth();
    ctx.save(); ctx.globalAlpha=0.15; ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.moveTo(0,0);
    for(let x=0;x<=w;x+=5) ctx.lineTo(x,20+Math.sin(x*0.02+time*0.003)*8+Math.sin(x*0.01+time*0.005)*4);
    ctx.lineTo(w,0); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=0.08; ctx.beginPath(); ctx.moveTo(0,0);
    for(let x=0;x<=w;x+=5) ctx.lineTo(x,35+Math.sin(x*0.015+time*0.004+1)*10);
    ctx.lineTo(w,0); ctx.closePath(); ctx.fill(); ctx.restore();
}

function draw() {
    const w=getWidth(), h=getHeight(), now=Date.now();
    ctx.clearRect(0,0,w,h);
    ctx.save();
    if(shakeIntensity>0){ ctx.translate((Math.random()-0.5)*shakeIntensity,(Math.random()-0.5)*shakeIntensity); }

    // Background gradient (per stage or default)
    const bg = (gameState==='PLAYING'||gameState==='BOSS_EVENT'||gameState==='BONUS_ROUND'||gameState==='STAGE_INTRO'||gameState==='STAGE_CLEAR'||gameState==='BLESSINGS') ? STAGES[currentStageIdx].bg : ['#87ceeb','#4facfe','#0066cc','#001e3c'];
    let grad = ctx.createLinearGradient(0,0,0,h);
    if (activePowerup==='FEVER') {
        let t=now*0.002; grad.addColorStop(0,`rgb(${Math.sin(t)*127+128|0},${Math.sin(t+2)*127+128|0},${Math.sin(t+4)*127+128|0})`); grad.addColorStop(1,'#001e3c');
    } else {
        grad.addColorStop(0,bg[0]); grad.addColorStop(0.33,bg[1]); grad.addColorStop(0.66,bg[2]); grad.addColorStop(1,bg[3]);
    }
    ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);

    // Meme time rainbow border
    if (memeTimeTimer > 0) {
        ctx.save(); ctx.globalAlpha = 0.15;
        const t = now * 0.003;
        ctx.strokeStyle = `hsl(${(t*50)%360},100%,60%)`;
        ctx.lineWidth = 8;
        ctx.strokeRect(4,4,w-8,h-8);
        ctx.restore();
    }

    drawWaves(now);

    // Light rays
    ctx.save(); ctx.globalAlpha=0.03;
    for(let i=0;i<5;i++){let lx=w*0.15+i*w*0.18;ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx-30,h*0.6);ctx.lineTo(lx+30,h*0.6);ctx.closePath();ctx.fill();}
    ctx.restore();

    // Bubbles
    ctx.fillStyle='rgba(255,255,255,0.3)';
    for(const b of bubbles){ctx.globalAlpha=b.opacity;ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;

    // Ocean floor
    ctx.save();
    const floorColor = (gameState==='PLAYING'||gameState==='BOSS_EVENT'||gameState==='BONUS_ROUND') ? STAGES[currentStageIdx].floor : 'rgba(194,154,108,0.5)';
    const weedColor = (gameState==='PLAYING'||gameState==='BOSS_EVENT'||gameState==='BONUS_ROUND') ? STAGES[currentStageIdx].weed : 'rgba(34,139,34,0.3)';
    let sg=ctx.createLinearGradient(0,h-40,0,h);
    sg.addColorStop(0,'rgba(0,0,0,0)'); sg.addColorStop(0.3,floorColor); sg.addColorStop(1,floorColor);
    ctx.fillStyle=sg; ctx.fillRect(0,h-40,w,40);
    ctx.fillStyle=weedColor;
    for(let i=0;i<6;i++){let sx=w*0.1+i*w*0.18,sw=Math.sin(now*0.002+i)*5;ctx.beginPath();ctx.moveTo(sx,h);ctx.quadraticCurveTo(sx+sw,h-30,sx+sw*0.5,h-45);ctx.quadraticCurveTo(sx+sw*0.3,h-30,sx+5,h);ctx.fill();}
    ctx.restore();

    // Boss event visuals
    if (gameState === 'BOSS_EVENT' && bossState) drawBossEvent();

    // Items
    for(const item of items) {
        ctx.font='40px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(item.def.emoji, item.x, item.y);
    }

    // Diver
    if(gameState!=='GAMEOVER'&&gameState!=='VICTORY'){
        ctx.save(); ctx.translate(diver.x,diver.y); ctx.rotate(diver.angle);
        if(activePowerup==='SHIELD'){ctx.shadowBlur=25;ctx.shadowColor='cyan';ctx.strokeStyle='rgba(0,255,255,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.stroke();}
        else if(activePowerup==='FEVER'){ctx.shadowBlur=25;ctx.shadowColor='gold';}
        else{ctx.shadowBlur=10;ctx.shadowColor='rgba(0,0,0,0.5)';}
        ctx.font='50px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🤿',0,0);
        ctx.restore();
    }

    // Particles
    for(const p of particles){ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;

    // Floating texts (canvas-based)
    for(const ft of floatingTexts){
        ctx.globalAlpha=ft.life/ft.maxLife;
        ctx.font='bold 22px Jua,Arial';ctx.textAlign='center';ctx.fillStyle=ft.color;
        ctx.shadowColor='black';ctx.shadowBlur=3;
        ctx.fillText(ft.text,ft.x,ft.y);
        ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;

    // Vignette
    if(vignetteAlpha>0){
        ctx.save(); ctx.globalAlpha=vignetteAlpha;
        const vg=ctx.createRadialGradient(w/2,h/2,h*0.3,w/2,h/2,h*0.8);
        vg.addColorStop(0,'transparent'); vg.addColorStop(1,vignetteColor);
        ctx.fillStyle=vg; ctx.fillRect(0,0,w,h); ctx.restore();
    }

    ctx.restore(); // end shake

    // Overlay screens (canvas-drawn)
    if (gameState === 'STAGE_INTRO') drawStageIntro();
    if (gameState === 'STAGE_CLEAR') drawStageClear();
    if (gameState === 'BLESSINGS') drawBlessings();
    if (gameState === 'BONUS_ROUND') drawBonusOverlay();
    if (gameState === 'VICTORY') drawVictory();
    // Boss warning text
    if (gameState === 'BOSS_EVENT' && bossState && bossState.timer < 1.5) {
        ctx.save(); ctx.globalAlpha = Math.max(0, 1 - bossState.timer);
        ctx.font='bold 36px Jua,Arial'; ctx.textAlign='center'; ctx.fillStyle='#ff4444';
        ctx.shadowColor='black'; ctx.shadowBlur=5;
        ctx.fillText(t('bossWarning'), w/2, h/3);
        ctx.shadowBlur=0; ctx.restore();
    }
}

function drawBossEvent() {
    const w=getWidth(), h=getHeight(), lanes=getLanes();
    if (!bossState) return;
    switch(bossState.type) {
        case 'crabParade':
            if (bossState.data.lanes) {
                bossState.data.lanes.forEach(l => {
                    if (l >= 0 && l < lanes.length) {
                        ctx.font='35px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
                        ctx.fillText('🦀', lanes[l], h*0.3);
                        ctx.fillText('🦀', lanes[l], h*0.5);
                        ctx.fillText('🦀', lanes[l], h*0.7);
                    }
                });
            }
            break;
        case 'eelBeams':
            if (bossState.data.beamLane >= 0 && bossState.data.beamLane < lanes.length) {
                const lx = lanes[bossState.data.beamLane];
                if (bossState.data.beamPhase === 'warn') {
                    ctx.save(); ctx.globalAlpha = 0.3; ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 4;
                    ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,h); ctx.stroke();
                    ctx.setLineDash([]); ctx.restore();
                } else if (bossState.data.beamPhase === 'active') {
                    ctx.save(); ctx.globalAlpha = 0.5; ctx.fillStyle = 'rgba(255,255,0,0.4)';
                    ctx.fillRect(lx-20,0,40,h); ctx.restore();
                    ctx.font='30px Arial'; ctx.textAlign='center'; ctx.fillText('⚡',lx,h*0.2);
                    ctx.fillText('⚡',lx,h*0.5);
                }
            }
            break;
        case 'cannonVolley':
            if (bossState.data.volley) {
                bossState.data.volley.forEach(v => {
                    if (v.phase === 'warn') {
                        ctx.save(); ctx.globalAlpha = 0.4; ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 3;
                        ctx.beginPath(); ctx.arc(v.x, h*0.6, 25, 0, Math.PI*2); ctx.stroke(); ctx.restore();
                    } else if (v.phase === 'drop' && v.y != null) {
                        ctx.font='35px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
                        ctx.fillText('💣', v.x, v.y);
                    }
                });
            }
            break;
        case 'krakenTentacles':
            if (bossState.data.zones) {
                bossState.data.zones.forEach(z => {
                    ctx.save();
                    ctx.globalAlpha = z.active ? 0.4 : 0.1;
                    ctx.fillStyle = z.active ? 'rgba(128,0,128,0.5)' : 'rgba(128,0,128,0.15)';
                    ctx.fillRect(z.x-40, 0, 80, h);
                    if (z.active) { ctx.font='40px Arial'; ctx.textAlign='center'; ctx.fillText('🐙',z.x,h*0.4); }
                    ctx.restore();
                });
            }
            break;
        case 'ventEruption':
            if (bossState.data.vents) {
                bossState.data.vents.forEach(v => {
                    ctx.save();
                    if (bossState.data.ventPhase === 'burst') {
                        ctx.globalAlpha = 0.5; ctx.fillStyle = 'rgba(255,120,40,0.5)';
                        ctx.fillRect(v.x-25, 0, 50, h);
                    } else {
                        ctx.globalAlpha = 0.2 + bossState.data.ventTimer * 0.3;
                        ctx.fillStyle = 'rgba(255,80,20,0.3)'; ctx.fillRect(v.x-25, h*0.6, 50, h*0.4);
                    }
                    ctx.font='30px Arial'; ctx.textAlign='center'; ctx.fillText('🌋', v.x, h-30);
                    ctx.restore();
                });
            }
            break;
        case 'orcaDash':
            if (bossState.data.orcaLane >= 0 && bossState.data.orcaLane < lanes.length) {
                const lx = lanes[bossState.data.orcaLane];
                if (bossState.data.orcaPhase === 'warn') {
                    ctx.save(); ctx.globalAlpha = 0.3; ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(lx-30, 0, 60, 40); ctx.font='35px Arial'; ctx.textAlign='center'; ctx.fillText('🐋',lx,25); ctx.restore();
                } else if (bossState.data.orcaPhase === 'dash') {
                    ctx.font='50px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText('🐋', lx, bossState.data.orcaY || 0);
                }
            }
            break;
    }
}
// ===== OVERLAY SCREENS (Canvas-drawn) =====
function drawStageIntro() {
    const w=getWidth(), h=getHeight();
    const cfg = STAGES[currentStageIdx];
    ctx.save();
    ctx.fillStyle = 'rgba(0,20,40,0.75)';
    ctx.fillRect(0, 0, w, h);
    // Stage number
    ctx.font = 'bold 28px Jua,Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#a8d0e6';
    ctx.fillText(t('stageLabel') + ' ' + cfg.id, w/2, h*0.3);
    // Stage name
    ctx.font = 'bold 42px Jua,Arial'; ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5;
    ctx.fillText(t(cfg.nameKey), w/2, h*0.4);
    ctx.shadowBlur = 0;
    // Hint
    ctx.font = '22px Jua,Arial'; ctx.fillStyle = '#ffd700';
    ctx.fillText(t(cfg.hintKey), w/2, h*0.5);
    // Mission
    ctx.font = '18px Jua,Arial'; ctx.fillStyle = '#a8d0e6';
    ctx.fillText('🎯 ' + t(cfg.missionKey), w/2, h*0.58);
    // Tap to continue (after timer)
    if (introTimer <= 0) {
        ctx.font = '18px Jua,Arial'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText(t('tapToContinue'), w/2, h*0.72);
    } else {
        // Countdown dots
        ctx.font = '24px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
        const dots = '●'.repeat(Math.ceil(introTimer));
        ctx.fillText(dots, w/2, h*0.72);
    }
    ctx.restore();
}

function drawStageClear() {
    const w=getWidth(), h=getHeight();
    ctx.save();
    ctx.fillStyle = 'rgba(0,20,40,0.75)';
    ctx.fillRect(0, 0, w, h);
    // Stage Clear!
    ctx.font = 'bold 44px Jua,Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5;
    ctx.fillText(t('stageClear'), w/2, h*0.3);
    ctx.shadowBlur = 0;
    // Stars
    const starY = h * 0.42;
    for (let i = 0; i < 3; i++) {
        const appear = clearTimer < (2.5 - i * 0.4);
        if (appear && i < clearStars) {
            ctx.font = '48px Arial'; ctx.fillText('⭐', w/2 - 60 + i * 60, starY);
        } else if (appear) {
            ctx.globalAlpha = 0.3; ctx.font = '48px Arial'; ctx.fillText('☆', w/2 - 60 + i * 60, starY);
            ctx.globalAlpha = 1;
        }
    }
    // Mission status
    if (clearMission) {
        ctx.font = '22px Jua,Arial'; ctx.fillStyle = '#00ff88';
        ctx.fillText(t('missionComplete'), w/2, h*0.55);
    }
    // Score
    ctx.font = '20px Jua,Arial'; ctx.fillStyle = '#fff';
    ctx.fillText(t('scoreLabel') + ' ' + score.toLocaleString(), w/2, h*0.63);
    // Tap to continue
    if (clearTimer <= 0) {
        ctx.font = '18px Jua,Arial'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText(t('tapToContinue'), w/2, h*0.75);
    }
    ctx.restore();
}

function drawBlessings() {
    const w=getWidth(), h=getHeight();
    ctx.save();
    ctx.fillStyle = 'rgba(0,15,35,0.85)';
    ctx.fillRect(0, 0, w, h);
    // Title
    ctx.font = 'bold 28px Jua,Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffd700';
    ctx.fillText(t('selectBlessing'), w/2, h*0.2);
    // 3 cards
    const cardW = w * 0.26, cardH = h * 0.22, gap = w * 0.04;
    const totalW = cardW * 3 + gap * 2;
    const startX = (w - totalW) / 2, startY = h * 0.38;
    const colors = ['#1a5276', '#1e8449', '#6c3483'];
    blessingOptions.forEach((b, i) => {
        const cx = startX + i * (cardW + gap);
        // Card bg
        ctx.fillStyle = colors[i]; ctx.globalAlpha = 0.85;
        roundRect(ctx, cx, startY, cardW, cardH, 15); ctx.fill();
        ctx.globalAlpha = 1;
        // Border
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
        roundRect(ctx, cx, startY, cardW, cardH, 15); ctx.stroke();
        // Text
        ctx.font = 'bold 16px Jua,Arial'; ctx.fillStyle = '#ffd700';
        ctx.fillText(t(b.nameKey), cx + cardW/2, startY + cardH * 0.35);
        ctx.font = '13px Jua,Arial'; ctx.fillStyle = '#e0e0e0';
        ctx.fillText(t(b.descKey), cx + cardW/2, startY + cardH * 0.65);
    });
    ctx.restore();
}

function drawBonusOverlay() {
    const w=getWidth();
    ctx.save();
    ctx.font = 'bold 24px Jua,Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd700'; ctx.globalAlpha = 0.8;
    ctx.fillText(t('bonusRound') + ' ' + Math.ceil(bonusTimer) + 's', w/2, 80);
    ctx.restore();
}

function drawVictory() {
    const w=getWidth(), h=getHeight();
    ctx.save();
    ctx.fillStyle = 'rgba(0,10,30,0.8)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = 'bold 48px Jua,Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8;
    ctx.fillText(t('victory'), w/2, h*0.3);
    ctx.shadowBlur = 0;
    ctx.font = '24px Jua,Arial'; ctx.fillStyle = '#fff';
    ctx.fillText(t('victoryMsg'), w/2, h*0.42);
    ctx.font = '28px Jua,Arial'; ctx.fillStyle = '#ffd700';
    ctx.fillText(t('scoreLabel') + ' ' + score.toLocaleString(), w/2, h*0.55);
    // Total stars
    const ts = gameProgress ? gameProgress.totalStars : 0;
    ctx.font = '22px Jua,Arial'; ctx.fillStyle = '#a8d0e6';
    ctx.fillText('⭐ ' + ts + ' / 24', w/2, h*0.65);
    ctx.font = '18px Jua,Arial'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(t('tapToContinue'), w/2, h*0.78);
    ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

// ===== GAME LOOP =====
function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    // Clamp dt to prevent huge jumps
    if (dt > 0.1) dt = 0.016;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

// ===== INIT =====
function init() {
    initLanguage();
    resize();
    window.addEventListener('resize', resize);
    canvas.addEventListener('touchstart', (e) => { handleTouchStart(e); handleCanvasTap(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
    canvas.addEventListener('mousedown', (e) => { handleMouseDown(e); handleCanvasTap(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);
    document.getElementById('nickname-submit-btn').addEventListener('click', registerNickname);
    document.getElementById('rank-btn').addEventListener('click', () => showLeaderboard(true));
    document.getElementById('close-leaderboard-btn').addEventListener('click', () => showLeaderboard(false));
    document.getElementById('pause-btn').addEventListener('click', pauseGame);
    document.getElementById('resume-btn').addEventListener('click', resumeGame);
    document.addEventListener('visibilitychange', () => { if(document.hidden&&(gameState==='PLAYING'||gameState==='BOSS_EVENT'))pauseGame(); });
    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('touchstart', initAudio, { once: true });
    document.getElementById('music-btn').addEventListener('click', (e) => { e.stopPropagation(); toggleMusic(); });
    updateMusicButton();
    for(let i=0;i<20;i++) bubbles.push(createBubble(true));
    loadProgress();
    checkUserSession();
    setupConnectionListener();
    requestAnimationFrame(gameLoop);
}

init();
</script>
